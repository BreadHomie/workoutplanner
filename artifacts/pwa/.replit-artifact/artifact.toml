kind = "web"
previewPath = "/pwa/"
title = "Workout Planner"
version = "1.0.0"
id = "artifacts/pwa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/pwa/" ]
localPort = 23922

[services.development]
run = "pnpm --filter @workspace/pwa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pwa", "run", "build" ]
publicDir = "artifacts/pwa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23922"
BASE_PATH = "/pwa/"
