openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Glide Fitness App API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: profile
    description: User profile
  - name: exercises
    description: Exercise library
  - name: workouts
    description: Workout generation
  - name: sessions
    description: Workout session logs
  - name: schedule
    description: Workout schedule

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateProfile
      tags: [profile]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /exercises:
    get:
      operationId: listExercises
      tags: [exercises]
      summary: List exercises with optional filters
      parameters:
        - name: difficulty
          in: query
          schema:
            type: string
            enum: [Beginner, Intermediate, Advanced]
        - name: equipment
          in: query
          schema:
            type: string
        - name: muscleGroup
          in: query
          schema:
            type: string
        - name: isCompound
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of exercises
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Exercise"

  /workouts/generate:
    post:
      operationId: generateWorkoutPlan
      tags: [workouts]
      summary: Generate a workout plan (single, weekly, or monthly) and persist sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePlanInput"
      responses:
        "200":
          description: Generated plan — array of planned sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlannedSession"

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List workout sessions
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkoutSession"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a new workout session log
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionInput"
      responses:
        "201":
          description: Created session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutSession"

  /sessions/{sessionId}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get a specific session with all logs and workout plan
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlannedSession"
    patch:
      operationId: updateSession
      tags: [sessions]
      summary: Update session (photo, mark complete)
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionInput"
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutSession"

  /sessions/{sessionId}/complete:
    post:
      operationId: completeWorkout
      tags: [sessions]
      summary: Mark workout complete and award XP + coins
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: XP and coins awarded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/XpReward"

  /sessions/{sessionId}/logs:
    post:
      operationId: addSessionLog
      tags: [sessions]
      summary: Add or update an exercise log entry for a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSessionLogInput"
      responses:
        "201":
          description: Created or updated log entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionLog"

  /sessions/{sessionId}/logs/{logId}:
    patch:
      operationId: updateSessionLog
      tags: [sessions]
      summary: Update a specific log entry (weight, reps, isCompleted)
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
        - name: logId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionLogInput"
      responses:
        "200":
          description: Updated log entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionLog"

  /sessions/{sessionId}/logs/{logId}/complete:
    post:
      operationId: completeExercise
      tags: [sessions]
      summary: Mark exercise complete and award XP
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
        - name: logId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: XP awarded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/XpReward"

  /exercises/{exerciseId}/last-log:
    get:
      operationId: getExerciseLastLog
      tags: [exercises]
      summary: Get the last logged entry for an exercise
      parameters:
        - name: exerciseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Last log entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionLog"
        "404":
          description: No previous log found

  /schedule:
    get:
      operationId: getSchedule
      tags: [schedule]
      summary: Get all scheduled workout days
      responses:
        "200":
          description: Schedule entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduleEntry"
    post:
      operationId: createScheduleEntry
      tags: [schedule]
      summary: Create a scheduled workout day
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleEntryInput"
      responses:
        "201":
          description: Created schedule entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleEntry"

  /schedule/bulk:
    put:
      operationId: saveScheduleBulk
      tags: [schedule]
      summary: Save a set of scheduled dates for the month (replaces existing for that month)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveScheduleBulkInput"
      responses:
        "200":
          description: Saved entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduleEntry"

  /schedule/{entryId}:
    delete:
      operationId: deleteScheduleEntry
      tags: [schedule]
      summary: Delete a scheduled workout
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [sessions]
      summary: Get workout stats summary
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        difficultyLevel:
          type: string
          enum: [Beginner, Intermediate, Advanced]
        equipment:
          type: array
          items:
            type: string
        targetCadence:
          type: integer
        preferredSplit:
          type: string
        totalXp:
          type: integer
        totalCoins:
          type: integer
        level:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, difficultyLevel, equipment, targetCadence, preferredSplit, totalXp, totalCoins, level, createdAt, updatedAt]

    UpdateProfileInput:
      type: object
      properties:
        difficultyLevel:
          type: string
          enum: [Beginner, Intermediate, Advanced]
        equipment:
          type: array
          items:
            type: string
        targetCadence:
          type: integer
        preferredSplit:
          type: string

    Exercise:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        equipment:
          type: string
        difficulty:
          type: string
          enum: [Beginner, Intermediate, Advanced]
        isCompound:
          type: boolean
        hitChest:
          type: boolean
        hitBack:
          type: boolean
        hitLegs:
          type: boolean
        hitCore:
          type: boolean
        hitArm:
          type: boolean
        hitShoulder:
          type: boolean
        classification:
          type: string
      required: [id, name, equipment, difficulty, isCompound, hitChest, hitBack, hitLegs, hitCore, hitArm, hitShoulder, classification]

    GeneratePlanInput:
      type: object
      properties:
        period:
          type: string
          enum: [daily, weekly, monthly]
        startDate:
          type: string
          format: date
          description: ISO date (YYYY-MM-DD) for when the plan starts
        difficultyLevel:
          type: string
          enum: [Beginner, Intermediate, Advanced]
        equipment:
          type: array
          items:
            type: string
        preferredSplit:
          type: string
          description: Program type e.g. "Full Body", "Push/Pull/Legs"
        targetCadence:
          type: integer
          description: Workouts per week
      required: [period, startDate, difficultyLevel, equipment, preferredSplit, targetCadence]

    ExerciseWithHistory:
      type: object
      properties:
        exercise:
          $ref: "#/components/schemas/Exercise"
        lastLog:
          $ref: "#/components/schemas/SessionLog"
        suggestedSets:
          type: integer
        suggestedReps:
          type: integer
      required: [exercise, suggestedSets, suggestedReps]

    Circuit:
      type: object
      properties:
        circuitNumber:
          type: integer
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/ExerciseWithHistory"
      required: [circuitNumber, exercises]

    GeneratedWorkout:
      type: object
      properties:
        splitType:
          type: string
        splitVariant:
          type: string
        compound:
          $ref: "#/components/schemas/ExerciseWithHistory"
        compound2:
          $ref: "#/components/schemas/ExerciseWithHistory"
        circuits:
          type: array
          items:
            $ref: "#/components/schemas/Circuit"
      required: [splitType, splitVariant, compound, circuits]

    WorkoutSession:
      type: object
      properties:
        id:
          type: integer
        splitType:
          type: string
        splitVariant:
          type: string
        scheduledDate:
          type: string
        completedAt:
          type: string
          format: date-time
        isCompleted:
          type: boolean
        photoUri:
          type: string
        logCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, splitType, splitVariant, isCompleted, createdAt, logCount]

    PlannedSession:
      type: object
      properties:
        id:
          type: integer
        splitType:
          type: string
        splitVariant:
          type: string
        scheduledDate:
          type: string
        completedAt:
          type: string
          format: date-time
        isCompleted:
          type: boolean
        photoUri:
          type: string
        createdAt:
          type: string
          format: date-time
        workoutPlan:
          $ref: "#/components/schemas/GeneratedWorkout"
        logs:
          type: array
          items:
            $ref: "#/components/schemas/SessionLogWithExercise"
        logCount:
          type: integer
      required: [id, splitType, splitVariant, isCompleted, createdAt, workoutPlan, logs, logCount]

    SessionLog:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        exerciseId:
          type: integer
        sets:
          type: integer
        reps:
          type: integer
        weightUsed:
          type: number
        notes:
          type: string
        isCompleted:
          type: boolean
        loggedAt:
          type: string
          format: date-time
      required: [id, sessionId, exerciseId, sets, reps, isCompleted, loggedAt]

    SessionLogWithExercise:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        exerciseId:
          type: integer
        exercise:
          $ref: "#/components/schemas/Exercise"
        sets:
          type: integer
        reps:
          type: integer
        weightUsed:
          type: number
        notes:
          type: string
        isCompleted:
          type: boolean
        loggedAt:
          type: string
          format: date-time
      required: [id, sessionId, exerciseId, exercise, sets, reps, isCompleted, loggedAt]

    AddSessionLogInput:
      type: object
      properties:
        exerciseId:
          type: integer
        sets:
          type: integer
        reps:
          type: integer
        weightUsed:
          type: number
        notes:
          type: string
        isCompleted:
          type: boolean
      required: [exerciseId, sets, reps]

    UpdateSessionLogInput:
      type: object
      properties:
        sets:
          type: integer
        reps:
          type: integer
        weightUsed:
          type: number
        notes:
          type: string
        isCompleted:
          type: boolean

    UpdateSessionInput:
      type: object
      properties:
        isCompleted:
          type: boolean
        photoUri:
          type: string
        completedAt:
          type: string
          format: date-time

    CreateSessionInput:
      type: object
      properties:
        splitType:
          type: string
        splitVariant:
          type: string
        scheduledDate:
          type: string
        completedAt:
          type: string
          format: date-time
      required: [splitType, splitVariant]

    XpReward:
      type: object
      properties:
        xpEarned:
          type: integer
        coinsEarned:
          type: integer
        totalXp:
          type: integer
        totalCoins:
          type: integer
        level:
          type: integer
        leveledUp:
          type: boolean
      required: [xpEarned, coinsEarned, totalXp, totalCoins, level, leveledUp]

    ScheduleEntry:
      type: object
      properties:
        id:
          type: integer
        scheduledDate:
          type: string
          format: date
        splitType:
          type: string
        splitVariant:
          type: string
        sessionId:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, scheduledDate, splitType, splitVariant, createdAt]

    CreateScheduleEntryInput:
      type: object
      properties:
        scheduledDate:
          type: string
          format: date
        splitType:
          type: string
        splitVariant:
          type: string
      required: [scheduledDate, splitType, splitVariant]

    SaveScheduleBulkInput:
      type: object
      properties:
        yearMonth:
          type: string
          description: "Format: YYYY-MM — the month to replace schedule for"
        dates:
          type: array
          items:
            type: string
            format: date
          description: List of ISO dates the user plans to work out
      required: [yearMonth, dates]

    StatsSummary:
      type: object
      properties:
        totalSessions:
          type: integer
        currentStreak:
          type: integer
        thisWeekCount:
          type: integer
        totalExercisesLogged:
          type: integer
        completedSessions:
          type: integer
      required: [totalSessions, currentStreak, thisWeekCount, totalExercisesLogged, completedSessions]
